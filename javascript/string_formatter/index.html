<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>String Formatter</title>
    <link rel="stylesheet" href="style.css">
    <script src="strings.js" defer></script>
</head>
<body>
    <main>
        <h1>String Formatter</h1>
        <form id="name-form">
            <label for="name">Name</label>
            <input id="name" placeholder="input name..." required />
            <label for="surname">Surname</label>
            <input id="surname" placeholder="input surname..." required />
            <button type="submit">Format Name</button>
        </form>
        <p id="formatted-name">Formatted name shows here</p>
    </main>
</body>
</html>
