<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Grid</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <img class="grid-image tall-image" src="img1.jpg" alt="A foggy beach with a large rock formation in the foreground">
        <img class="grid-image" src="img3.png" alt="A table topped with plates and bowls of food">
        <img class="grid-image tall-image" src="img4.jpg" alt="A building with a red door and a tree in front of it">
        <img class="grid-image tall-image" src="img5.jpg" alt="A row of white apartment buildings next to a street">
        <img class="grid-image" src="img2.jpg" alt="A living room with a white couch and a round window">
        <img class="grid-image" src="img6.png" alt="A view of a beach from the top of a hill">
    </main>
</body>
</html>
