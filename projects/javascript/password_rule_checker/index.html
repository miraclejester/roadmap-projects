<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Rule Checker</title>
    <script src="passwords.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Password Rule Checker</h1>
        <form id="password-form">
            <label for="password-input">Password</label>
            <input id="password-input" required/>
            <button type="submit">Validate</button>
        </form>
        <p id="validation-message">Validation message goes here</p>
    </main>
</body>
</html>
