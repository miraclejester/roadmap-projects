<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Number Checker</title>
    <script src="numbers.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Number Checker</h1>
        <form id="checker-form">
            <label for="number-value">Input Value</label>
            <input id="number-value" type="number" required />
            <button type="submit">Check number</button>
        </form>
        <p id="checker-message">Number check result will show here</p>
    </main>
</body>
</html>
