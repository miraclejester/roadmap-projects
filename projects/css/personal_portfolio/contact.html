<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Miracle Jester | Contact</title>

    <!-- SEO Tags -->
    <meta name="description" content="Contact page for the developer known as Miracle Jester">
    <meta name="robots" content="index, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Open Graph Tags -->
    <meta property="og:title" content="Miracle Jester | Contact">
    <meta property="og:type" content="website">
    <meta property="og:description" content="Contact page for the developer known as Miracle Jester">
    <meta property="og:locale" content="en_US">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="content-block">
        <div id="top-header">
            <section class="dev-heading">
                <img src="favicon-32x32.png" alt="Developer personal icon">
                <h2>Miracle Jester</h2>
            </section>
            <nav>
                <a href="index.html">Home</a>
                <a href="projects.html">Projects</a>
                <a href="articles.html">Articles</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>
    <main class="content-block">
        <h1>Contact Form</h1>
        <form action="https://httpbin.org/post" method="post" class="content-single-group">
            <div class="field">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="field">
                <label for="reason">Reason</label>
                <select id="reason" name="reason">
                    <option value="question">General Question</option>
                    <option value="complaint">Complaint</option>
                    <option value="money">Free Money</option>
                    <option value="business">Business Inquiry</option>
                </select>
            </div>

            <div class="field">
                <label for="content">Content</label>
                <textarea id="content" name="content" rows="4" required></textarea>
            </div>
            
            <button type="submit">Submit</button>
        </form>
    </main>
    <footer>
        <p>&copy; all rights reserved 2026</p>
    </footer>
</body>
</html>
